name: Release

# Cuts a tag + GitHub Release using the built-in GITHUB_TOKEN (no external
# secrets). Push a branch named release-vX.Y.Z and this creates tag vX.Y.Z
# (an alpha pre-release) at that branch's commit, with auto-generated notes.
on:
  workflow_dispatch:
  push:
    branches:
      - "release-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME#release-}"
          echo "Releasing $TAG at $GITHUB_SHA"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Alpha $TAG" \
            --prerelease \
            --generate-notes
